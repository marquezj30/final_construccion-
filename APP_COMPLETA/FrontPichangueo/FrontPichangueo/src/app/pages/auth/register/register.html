<main class="auth-page">
  <section class="auth-visual">
    <div class="auth-brand">
      <span>P</span>
      <strong>Pichangueo</strong>
    </div>
    <div class="visual-card">
      <img src="/auth-football.jpg" alt="Jugadores disputando un partido de futbol" />
    </div>
  </section>

  <section class="auth-panel register-panel" aria-labelledby="register-title">
    <p class="eyebrow">REGISTRATE</p>
    <h1 id="register-title">Crea tu cuenta</h1>
    <p class="message error" *ngIf="error">{{ error }}</p>

    <form (ngSubmit)="submit()">
      <label>
        Username
        <input type="text" name="username" [(ngModel)]="username" required />
      </label>

      <label>
        Nombre
        <input type="text" name="name" [(ngModel)]="name" required />
      </label>

      <label>
        Email
        <input type="email" name="email" [(ngModel)]="email" autocomplete="email" required />
      </label>

      <label>
        Telefono
        <input type="tel" name="phone" [(ngModel)]="phone" />
      </label>

      <label>
        Password
        <input type="password" name="password" [(ngModel)]="password" autocomplete="new-password" required />
      </label>

      <button type="submit" [disabled]="loading">{{ loading ? 'Registrando...' : 'Registrate' }}</button>
    </form>

    <a routerLink="/login">Ya tengo una cuenta</a>
  </section>
</main>
